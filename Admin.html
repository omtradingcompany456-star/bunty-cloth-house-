<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunty Cloth House Admin Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111827;
}

.login-box{
width:350px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

h2{
text-align:center;
margin-bottom:20px;
color:#111827;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#D4AF37;
border:none;
font-size:16px;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

button:hover{
opacity:.9;
}

.note{
text-align:center;
margin-top:15px;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" id="user" placeholder="Username">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<div class="note">
Bunty Cloth House Admin Panel
</div>

</div>

<script>

function login(){

let username =
document.getElementById("user").value;

let password =
document.getElementById("pass").value;

const admins = [

{
user:"Mayank",
pass:"9253588401"
},

{
user:"Bunty",
pass:"9466682600"
},

{
user:"Sourabh",
pass:"7015717772"
},

{
user:"Gourav",
pass:"9036149000"
}

];

const valid = admins.some(
admin =>
admin.user === username &&
admin.pass === password
);
if(valid){

localStorage.setItem(
"admin",
username
);

alert("Login Successful");

}else{

alert("Wrong Username or Password");

}

}

</script>

</body>
</html>
